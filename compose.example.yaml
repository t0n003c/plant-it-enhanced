name: plant-it-enhanced

services:
  server:
    image: ghcr.io/t0n003c/plant-it-enhanced:latest
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: "${MYSQL_DATABASE:?MYSQL_DATABASE is required}"
      MYSQL_USERNAME: "${MYSQL_USER:?MYSQL_USER is required}"
      MYSQL_PSW: "${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}"
      CACHE_HOST: cache
      CACHE_PORT: "6379"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - ./data/upload:/upload-dir
    ports:
      - "8080:8080"
      - "3000:3000"
    networks:
      - backend
      - app

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      TZ: "${TZ:-UTC}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:?MYSQL_DATABASE is required}"
      MYSQL_USER: "${MYSQL_USER:?MYSQL_USER is required}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}"
      MYSQL_ROOT_HOST: localhost
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          MYSQL_PWD="$${MYSQL_PASSWORD}"
          mysql --protocol=TCP -h127.0.0.1
          -u"$${MYSQL_USER}" "$${MYSQL_DATABASE}"
          -e "SELECT 1" >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  cache:
    image: redis:7.2-alpine
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  backend:
    internal: true
  app:
    driver: bridge
