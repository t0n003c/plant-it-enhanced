name: plant-it-enhanced

# Dockge/UGREEN NAS example. Keep this file and .env together in the stack
# directory. Only the server joins the external proxy network; MySQL and Redis
# remain reachable exclusively through the private internal network.
services:
  server:
    image: "${PLANTIT_IMAGE:-ghcr.io/t0n003c/plant-it-enhanced:latest}"
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: "${MYSQL_DATABASE:?MYSQL_DATABASE is required}"
      MYSQL_USERNAME: "${MYSQL_USER:?MYSQL_USER is required}"
      MYSQL_PSW: "${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}"
      CACHE_HOST: cache
      CACHE_PORT: "6379"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - "${PLANTIT_UPLOAD_PATH:?Set PLANTIT_UPLOAD_PATH in .env}:/upload-dir"
    # Nginx Proxy Manager only needs port 3000; the bundled web server proxies
    # /api/ to 8080 internally. Port 8080 remains exposed for optional direct
    # API routing and diagnostics. Neither port is published on the NAS host.
    expose:
      - "8080"
      - "3000"
    networks:
      backend:
      proxy:
        aliases:
          - plantit-server
    healthcheck:
      test:
        - CMD-SHELL
        - nc -z 127.0.0.1 8080 && nc -z 127.0.0.1 3000
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      TZ: "${TZ:-UTC}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:?MYSQL_DATABASE is required}"
      MYSQL_USER: "${MYSQL_USER:?MYSQL_USER is required}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}"
      MYSQL_ROOT_HOST: localhost
    volumes:
      - "${PLANTIT_DB_PATH:?Set PLANTIT_DB_PATH in .env}:/var/lib/mysql"
    networks:
      - backend
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          MYSQL_PWD="$${MYSQL_PASSWORD}"
          mysql --protocol=TCP -h127.0.0.1
          -u"$${MYSQL_USER}" "$${MYSQL_DATABASE}"
          -e "SELECT 1" >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  cache:
    image: redis:7.2-alpine
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  backend:
    internal: true
  proxy:
    external: true
    name: "${PLANTIT_PROXY_NETWORK:-TinhnasNetwork}"
