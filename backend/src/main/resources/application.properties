#
# DB
#
#jdbc:h2:file:./testdb
spring.datasource.url                            = jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:bootdb}?createDatabaseIfNotExist=true&autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username                       = ${MYSQL_USERNAME:root}
spring.datasource.password                       = ${MYSQL_PSW:root}
spring.sql.init.platform                         = mysql
spring.datasource.driver-class-name              = com.mysql.cj.jdbc.Driver
spring.jpa.show-sql                              = ${JPA_LOG:false}
spring.jpa.properties.hibernate.format_sql       = false
spring.jpa.properties.hibernate.dialect          = org.hibernate.dialect.MySQLDialect
spring.jpa.generate-ddl                          = true
# should be "validate" but it starts the validation process too soon (before liquibase terminate initializing)
spring.jpa.hibernate.ddl-auto                    = none


#
# Redis
#
spring.cache.type                                = ${CACHE_TYPE:redis}
spring.data.redis.host                           = ${CACHE_HOST:cache}
spring.data.redis.port                           = ${CACHE_PORT:6379}
spring.cache.redis.time-to-live                  = ${CACHE_TTL:7200000}
spring.cache.redis.key-prefix                    = ${CACHE_KEY_PREFIX:plant-it:@project.version@:}
spring.data.redis.password                       = ${CACHE_PASSWORD}
spring.data.redis.username                       = ${CACHE_USERNAME:default}


#
# Data initialization
#
spring.liquibase.change-log                      = classpath:/dblogs/changelog/changelog-master.xml
spring.jpa.defer-datasource-initialization       = false
logging.level.liquibase                          = ${INTERNAL_LOG_LEVEL:TRACE}
spring.liquibase.clear-checksums                 = false


#
# Logging
#
logging.level.org.apache.tomcat                  = ${INTERNAL_LOG_LEVEL:ERROR}
logging.level.org.apache.catalina                = ${INTERNAL_LOG_LEVEL:ERROR}
logging.level.org.springframework.security       = ${INTERNAL_LOG_LEVEL:ERROR}
logging.level.org.hibernate                      = ${INTERNAL_LOG_LEVEL:ERROR}
logging.level.web                                = ${INTERNAL_LOG_LEVEL:ERROR}
logging.level.org.springframework.web            = ${INTERNAL_LOG_LEVEL:ERROR}
spring.mvc.log-request-details                   = ${SPRING_LOG_REQUEST:false}
logging.level.com.github.mdeluise.plantit        = ${LOG_LEVEL:INFO}


#
# JWT
#
jwt.secretKey                                    = ${JWT_SECRET:thisIsAVeryComplexSecretKey}
jwt.tokenExpirationAfterDays                     = ${JWT_EXP:1}
jwt.issuer                                       = plant-it
jwt.cookie.name                                  = plant-it


#
# Server config
#
server.port                                      = ${API_PORT:8080}
server.servlet.context-path                      = /api
server.cors.allowed-origins                      = ${ALLOWED_ORIGINS:*}
server.owner.contact                             = ${CONTACT_MAIL:}
# Forwarded headers are consumed only by the explicit trusted-proxy client-IP resolver below.
# This avoids trusting arbitrary X-Forwarded-* values on directly exposed deployments.
server.forward-headers-strategy                  = none
server.proxy.trusted-proxies                     = ${TRUSTED_PROXY_CIDRS:}
server.proxy.client-ip-headers                   = ${TRUSTED_CLIENT_IP_HEADERS:X-Forwarded-For}


#
# SMTP
#
spring.mail.host                                 = ${SMTP_HOST:}
spring.mail.port                                 = ${SMTP_PORT:}
spring.mail.username                             = ${SMTP_EMAIL:}
spring.mail.password                             = ${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth            = ${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable = ${SMTP_START_TTL:true}


#
# Rate Limiting
#
#server.rateLimit.requestPerSeconds               = ${MAX_REQUESTS_PER_MINUTE:50}
server.rateLimit.requestPerMinute                = ${MAX_REQUESTS_PER_MINUTE:999}
server.rateLimit.maximumClients                  = ${MAX_RATE_LIMIT_CLIENTS:10000}
server.rateLimit.clientIdleTtlSeconds             = ${RATE_LIMIT_CLIENT_TTL_SECONDS:600}


#
# Swagger UI
#
springdoc.swagger-ui.path                        = /swagger-ui.html
springdoc.swagger-ui.operationsSorter            = method
springdoc.swagger-ui.tagsSorter                  = alpha


#
# Info
#
app.version                                      = @project.version@
app.github-repository                            = ${APP_GITHUB_REPOSITORY:t0n003c/plant-it-enhanced}
diagnostics.public-outbound-ip                   = ${PUBLIC_OUTBOUND_IP:}


#
# System config
#
users.max                                        = ${USERS_LIMIT:-1}
floracodex.url                                   = ${FLORACODEX_URL:https://api.floracodex.com}
floracodex.key                                   = ${FLORACODEX_KEY:}
inaturalist.enabled                              = ${INATURALIST_ENABLED:true}
inaturalist.url                                  = ${INATURALIST_URL:https://api.inaturalist.org}
inaturalist.preferred-place-id                   = ${INATURALIST_PLACE_ID:1}
inaturalist.requests-per-second                  = ${INATURALIST_REQUESTS_PER_SECOND:1}
inaturalist.request-burst                        = ${INATURALIST_REQUEST_BURST:2}
gbif.url                                         = ${GBIF_URL:https://api.gbif.org}
gbif.minimum-confidence                          = ${GBIF_MIN_CONFIDENCE:90}
plant-search.locale                              = ${PLANT_SEARCH_LOCALE:en}
plant-search.region                              = ${PLANT_SEARCH_REGION:US}
plant-search.user-agent                          = ${PLANT_SEARCH_USER_AGENT:Plant-it self-hosted plant search}
plantnet.url                                     = ${PLANTNET_URL:https://my-api.plantnet.org}
plantnet.api-key                                 = ${PLANTNET_API_KEY:}
plantnet.maximum-results                         = ${PLANTNET_MAX_RESULTS:5}
plantnet.minimum-confidence                      = ${PLANTNET_MIN_CONFIDENCE:0.05}
plantnet.location-project-enabled                = ${PLANTNET_LOCATION_PROJECT_ENABLED:true}
plantnet.location-precision-degrees              = ${PLANTNET_LOCATION_PRECISION_DEGREES:0.5}
identification.context.enabled                   = ${IDENTIFICATION_CONTEXT_ENABLED:true}
identification.context.occurrence-radius-km      = ${IDENTIFICATION_OCCURRENCE_RADIUS_KM:100}
identification.context.occurrence-result-limit   = ${IDENTIFICATION_OCCURRENCE_RESULT_LIMIT:200}
trefle.url                                       = ${TREFLE_URL:https://trefle.io}
trefle.token                                     = ${TREFLE_TOKEN:}
perenual.url                                     = ${PERENUAL_URL:https://www.perenual.com/api}
perenual.api-key                                 = ${PERENUAL_API_KEY:}
upload.location                                  = ${UPLOAD_DIR:/upload-dir}
reminders.notify_check                           = ${REMINDER_NOTIFY_CHECK:0 30 7 * * *}


#
# Image upload
#
image.max_origin_size                            = ${MAX_ORIGIN_IMG_SIZE:10000000}
spring.servlet.multipart.max-file-size           = ${MAX_UPLOAD_IMG_SIZE:15MB}
spring.servlet.multipart.max-request-size        = ${MAX_UPLOAD_REQUEST_SIZE:50MB}
image.proxy.allowed-hosts                        = ${IMAGE_PROXY_ALLOWED_HOSTS:static.inaturalist.org,inaturalist-open-data.s3.amazonaws.com,bs.plantnet.org,api.floracodex.com}
image.proxy.allowed-ports                        = ${IMAGE_PROXY_ALLOWED_PORTS:80,443}
image.proxy.allow-private-addresses              = ${IMAGE_PROXY_ALLOW_PRIVATE_ADDRESSES:false}


#
# Notification
#
server.notification.ntfy.enabled                 = ${NTFY_ENABLED:false}
server.notification.gotify.enabled               = ${GOTIFY_ENABLED:false}
