events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Preserve HTTPS information supplied by Cloudflare/Nginx Proxy Manager,
    # while still producing a useful value for direct LAN access.
    map $http_x_forwarded_proto $plantit_forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    server {
        listen 3000;
        server_name localhost;

        # Guided identification can upload several photos in one request.
        client_max_body_size 50m;

        root /opt/app/frontend/build/web;
        index index.html;

        # Keep the public deployment single-origin and single-destination.
        # Reverse proxies only need to forward the hostname to port 3000;
        # this bundled nginx sends API traffic to Spring Boot internally.
        location ^~ /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $plantit_forwarded_proto;
            # The backend sees this nginx hop as loopback. Preserve the actual
            # immediate upstream so its trusted-proxy policy still applies.
            proxy_set_header X-Plantit-Proxy-Source $remote_addr;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
        }

        # Flutter's entry files keep stable names across releases. Require
        # browsers and reverse proxies to fetch them again so a newly deployed
        # index never starts an older cached application bundle.
        location ~ ^/(?:index\.html|update\.html|main\.dart\.js|flutter(?:_bootstrap|_service_worker)?\.js|manifest\.json|version\.json)$ {
            try_files $uri =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header X-Frame-Options "DENY" always;
        }

        location / {
            # Flutter assets are not content-hashed consistently. Revalidate
            # them rather than allowing a CDN to apply a long heuristic TTL.
            add_header Cache-Control "no-cache, must-revalidate" always;
            try_files $uri $uri/ /index.html;
        }

        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
