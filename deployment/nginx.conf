events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 3000;
        server_name localhost;

        root /opt/app/frontend/build/web;
        index index.html;

        # Flutter's entry files keep stable names across releases. Require
        # browsers and reverse proxies to fetch them again so a newly deployed
        # index never starts an older cached application bundle.
        location ~ ^/(?:index\.html|update\.html|main\.dart\.js|flutter(?:_bootstrap|_service_worker)?\.js|manifest\.json|version\.json)$ {
            try_files $uri =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header X-Frame-Options "DENY" always;
        }

        location / {
            # Flutter assets are not content-hashed consistently. Revalidate
            # them rather than allowing a CDN to apply a long heuristic TTL.
            add_header Cache-Control "no-cache, must-revalidate" always;
            try_files $uri $uri/ /index.html;
        }

        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
