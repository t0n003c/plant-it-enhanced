serverName: plantitserver
dbName: plantitdatabase
cacheName: plantitcache

dbMountPath: /var/lib/mysql
dbMountCapacity: 512Mi

secret:
  name: plantitsecret
  data:
    MYSQL_PSW: replace-with-a-long-database-password
    MYSQL_ROOT_PASSWORD: replace-with-a-different-root-password
    JWT_SECRET: replace-with-a-long-random-jwt-secret
    FLORACODEX_KEY: ""

configmap:
  name: plantitconfigmap
  data:
    MYSQL_HOST: db-service
    MYSQL_PORT: 3306
    MYSQL_USERNAME: plantit
    MYSQL_DATABASE: bootdb
    JWT_EXP: 1
    USERS_LIMIT: -1
    UPLOAD_DIR: /upload-dir
    API_PORT: 8080
    LOG_LEVEL: INFO
    ALLOWED_ORIGINS: "*"
    CACHE_TTL: 86400
    CACHE_HOST: cache-service
    CACHE_PORT: 6379

image:
  server:
    name: ghcr.io/t0n003c/plant-it-enhanced
    tag: latest
  db:
    name: mysql
    tag: 8.0
  cache:
    name: redis
    tag: 7.2-alpine
