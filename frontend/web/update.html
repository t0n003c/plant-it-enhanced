<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'none'"
  >
  <title>Refresh Plant-it Enhanced</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      align-items: center;
      background: #f3f7f4;
      color: #183128;
      display: flex;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    main {
      background: #ffffff;
      border: 1px solid #b7cabf;
      border-radius: 18px;
      box-shadow: 0 12px 32px rgb(24 49 40 / 12%);
      box-sizing: border-box;
      max-width: 520px;
      padding: 28px;
      width: 100%;
    }

    h1 {
      font-size: 1.6rem;
      line-height: 1.2;
      margin: 0 0 14px;
    }

    p {
      line-height: 1.55;
      margin: 0 0 20px;
    }

    button {
      background: #1d5b45;
      border: 0;
      border-radius: 12px;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      min-height: 52px;
      padding: 12px 20px;
      width: 100%;
    }

    button:focus-visible {
      outline: 3px solid #8ad5a5;
      outline-offset: 3px;
    }

    button:disabled {
      cursor: progress;
      opacity: 0.7;
    }

    #status {
      font-weight: 600;
      margin-top: 18px;
      min-height: 1.5em;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #102019;
        color: #e3f4e8;
      }

      main {
        background: #182c25;
        border-color: #496c5e;
      }

      button {
        background: #9ee6b4;
        color: #102019;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Refresh Plant-it Enhanced</h1>
    <p>
      Use this after a server update if the app still shows an older interface.
      It removes only the cached Flutter app shell. Accounts, plants, photos,
      settings, and offline journal data are not deleted.
    </p>
    <button id="refresh" type="button">Refresh the app safely</button>
    <p id="status" role="status" aria-live="polite"></p>
  </main>
  <script>
    const refreshButton = document.getElementById("refresh");
    const statusText = document.getElementById("status");

    refreshButton.addEventListener("click", async () => {
      refreshButton.disabled = true;
      statusText.textContent = "Removing the old app shell…";

      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const cacheNames = await caches.keys();
          await Promise.all(
            cacheNames
              .filter((cacheName) => cacheName.startsWith("flutter-"))
              .map((cacheName) => caches.delete(cacheName)),
          );
        }

        statusText.textContent = "Updated. Reopening Plant-it…";
        window.setTimeout(() => {
          window.location.replace("/?app_refresh=" + Date.now());
        }, 500);
      } catch (error) {
        statusText.textContent =
          "The automatic refresh was blocked. Close the app and clear this site's cached files.";
        refreshButton.disabled = false;
      }
    });
  </script>
</body>
</html>
