name: Catalog provider canary

on:
  schedule:
    - cron: "17 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: catalog-provider-canary
  cancel-in-progress: false

jobs:
  audit:
    name: Audit live plant providers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run quota-safe catalog canaries
        id: canary
        continue-on-error: true
        env:
          CATALOG_CANARY_SCOPE: full
          CATALOG_CANARY_DELAY_SECONDS: "1"
          TREFLE_TOKEN: ${{ secrets.TREFLE_TOKEN }}
          PLANTNET_API_KEY: ${{ secrets.PLANTNET_API_KEY }}
        run: ./scripts/catalog-canary.sh

      - name: Upload sanitized canary report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: catalog-canary-report
          path: catalog-canary-report.json
          if-no-files-found: error
          retention-days: 30

      - name: Add report to the workflow summary
        if: always()
        run: |
          jq -r '
            "Audited **\(.auditedPlants)** plants with **\(.failures)** failures.",
            "",
            (.results | group_by(.provider)[] |
              "- **\(.[0].provider)**: \(map(select(.passed)) | length)/\(length) passed"),
            "",
            (.results[] | select(.passed | not) |
              "- **\(.provider)** `\(.query)`: FAIL — \(.detail)")
          ' catalog-canary-report.json >> "$GITHUB_STEP_SUMMARY"

      - name: Report repeated provider failure
        if: steps.canary.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Automated catalog provider canary failure"
          number=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          body="The weekly catalog provider audit failed after retries. Review the sanitized artifact and run: $RUN_URL"
          if [ -n "$number" ]; then
            gh issue comment "$number" --body "$body"
          else
            gh issue create --title "$title" --label bug --body "$body"
          fi
          exit 1

      - name: Close a recovered provider alert
        if: steps.canary.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Automated catalog provider canary failure"
          number=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$number" ]; then
            gh issue comment "$number" --body "The scheduled catalog provider canary has recovered."
            gh issue close "$number" --reason completed
          fi
